<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Where Did I Park?</title>
  <meta name="theme-color" content="#000000" />
  <style>
    :root{
      --bg:#000000;
      --card:#1c1c1e;
      --text:#f5f5f7;
      --muted:#9a9aa0;
      --green:#30d158;
      --shadow:0 10px 30px rgba(0,0,0,.28);
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Segoe UI",sans-serif;}
    body{min-height:100vh;min-height:100dvh;}
    .app{
      width:min(100%, 860px);
      margin:0 auto;
      padding:calc(env(safe-area-inset-top, 0px) + 14px) 14px calc(env(safe-area-inset-bottom, 0px) + 18px);
    }
    .hero{text-align:center;margin:4px 0 14px;}
    .hero h1{margin:0 0 4px;font-size:clamp(1.7rem,4vw,2.25rem);font-weight:700;letter-spacing:-0.03em;}
    .hero p{margin:0;color:var(--muted);font-size:.95rem;}
    .status{
      background:linear-gradient(180deg, #171717 0%, #101010 100%);
      border:1px solid rgba(255,255,255,.06);
      border-radius:24px;
      padding:16px 14px;
      box-shadow:var(--shadow);
      margin-bottom:14px;
      text-align:center;
    }
    .status-label{color:var(--muted);font-size:.88rem;margin-bottom:6px;}
    .status-main{
      min-height:54px;
      display:flex;align-items:center;justify-content:center;
      font-size:clamp(1.8rem,6vw,2.6rem);font-weight:800;letter-spacing:-0.04em;
      margin-bottom:6px;
      word-break:break-word;
    }
    .status-sub{
      color:#c9c9ce;font-size:.92rem;line-height:1.4;min-height:36px;
    }
    .status-empty{color:#6e6e73;}
    .actions{
      display:flex;gap:10px;margin-top:12px;justify-content:center;flex-wrap:wrap;
    }
    button{appearance:none;border:none;cursor:pointer;font:inherit;}
    .secondary-btn,.primary-btn{
      padding:11px 14px;border-radius:14px;min-width:128px;font-weight:700;box-shadow:var(--shadow);
    }
    .secondary-btn{background:var(--card);color:var(--text);}
    .primary-btn{background:#2a2a2c;color:var(--text);}
    .secondary-btn:active,.primary-btn:active,.floor-btn:active{transform:scale(.98);}
    .grid{
      display:grid;
      grid-template-columns:repeat(2, minmax(0, 1fr));
      gap:10px;
    }
    .floor-btn{
      background:var(--card);
      color:var(--text);
      border-radius:18px;
      min-height:68px;
      font-size:1.45rem;
      font-weight:700;
      box-shadow:var(--shadow);
      transition:transform .12s ease, background .12s ease, box-shadow .12s ease;
      position:relative;overflow:hidden;
    }
    .floor-btn::after{
      content:"";position:absolute;inset:0;
      background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,0));
      opacity:.8;pointer-events:none;
    }
    .floor-btn.selected{
      background:var(--green);
      color:#041608;
      box-shadow:0 12px 30px rgba(48,209,88,.28);
    }
    .footer-note{margin-top:12px;text-align:center;color:#6e6e73;font-size:.84rem;}
    .toast{
      position:fixed;left:50%;bottom:calc(env(safe-area-inset-bottom, 0px) + 18px);
      transform:translateX(-50%) translateY(16px);
      background:rgba(28,28,30,.96);color:var(--text);
      padding:12px 16px;border-radius:999px;font-size:.92rem;box-shadow:var(--shadow);
      opacity:0;pointer-events:none;transition:opacity .2s ease, transform .2s ease;
      white-space:nowrap;max-width:calc(100vw - 32px);text-overflow:ellipsis;overflow:hidden;
    }
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
    .hidden{display:none !important;}
    .photo-wrap{
      display:flex;justify-content:center;align-items:center;
      min-height:54px;margin-bottom:6px;
    }
    .photo-preview{
      width:100%;
      max-width:280px;
      max-height:220px;
      border-radius:16px;
      object-fit:cover;
      box-shadow:var(--shadow);
      border:1px solid rgba(255,255,255,.08);
    }
    input[type="file"]{display:none;}
    @media (max-width: 420px){
      .app{padding-left:12px;padding-right:12px;}
      .floor-btn{min-height:62px;font-size:1.3rem;}
      .secondary-btn,.primary-btn{min-width:118px;padding:10px 12px;}
      .hero h1{font-size:1.8rem;}
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="hero">
      <h1>Where Did I Park?</h1>
      <p>Tap a floor to save it. Or capture one photo of your location.</p>
    </section>

    <section class="status" aria-live="polite">
      <div class="status-label" id="statusLabel">Saved parking floor</div>

      <div id="floorView">
        <div class="status-main" id="savedFloor">—</div>
      </div>

      <div id="photoView" class="hidden">
        <div class="photo-wrap">
          <img id="savedPhoto" class="photo-preview" alt="Saved parking location photo" />
        </div>
      </div>

      <div class="status-sub" id="savedTime">No parking spot saved yet.</div>

      <div class="actions">
        <button class="primary-btn" id="captureBtn" type="button">Capture Area</button>
        <button class="secondary-btn" id="toggleBtn" type="button">View Location</button>
        <button class="secondary-btn" id="clearBtn" type="button">Clear</button>
      </div>
      <input id="photoInput" type="file" accept="image/*" capture="environment" />
    </section>

    <section class="grid" id="grid" aria-label="Parking floor options"></section>

    <div class="footer-note">Your floor and one photo stay saved when you reopen the app.</div>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    const FLOORS = ["1A","1B","2A","2B","3A","3B","4A","4B","5A","5B","6A","6B","7A","7B"];
    const FLOOR_KEY = "parking-floor-entry-v3";
    const DB_NAME = "parking-photo-db";
    const STORE_NAME = "photos";
    const PHOTO_KEY = "latest";
    const VIEW_MODE_KEY = "parking-view-mode";

    const grid = document.getElementById("grid");
    const savedFloorEl = document.getElementById("savedFloor");
    const savedTimeEl = document.getElementById("savedTime");
    const clearBtn = document.getElementById("clearBtn");
    const toast = document.getElementById("toast");
    const captureBtn = document.getElementById("captureBtn");
    const photoInput = document.getElementById("photoInput");
    const toggleBtn = document.getElementById("toggleBtn");
    const floorView = document.getElementById("floorView");
    const photoView = document.getElementById("photoView");
    const savedPhoto = document.getElementById("savedPhoto");
    const statusLabel = document.getElementById("statusLabel");

    let currentEntry = null;
    let currentPhoto = null;

    function showToast(message){
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => toast.classList.remove("show"), 1600);
    }

    function formatSavedTime(isoString){
      const date = new Date(isoString);
      if (Number.isNaN(date.getTime())) return "Saved just now";
      const absolute = date.toLocaleString([], {
        year: "numeric", month: "short", day: "numeric", hour: "numeric", minute: "2-digit"
      });
      const diffMs = Date.now() - date.getTime();
      const diffMin = Math.max(0, Math.floor(diffMs / 60000));
      let ago = "just now";
      if (diffMin >= 1 && diffMin < 60) ago = `${diffMin} min ago`;
      else if (diffMin >= 60 && diffMin < 1440) {
        const h = Math.floor(diffMin / 60);
        const m = diffMin % 60;
        ago = m ? `${h}h ${m}m ago` : `${h}h ago`;
      } else if (diffMin >= 1440) {
        const d = Math.floor(diffMin / 1440);
        ago = d === 1 ? "1 day ago" : `${d} days ago`;
      }
      return `${absolute} • ${ago}`;
    }

    function getSavedEntry(){
      try{
        const raw = localStorage.getItem(FLOOR_KEY);
        return raw ? JSON.parse(raw) : null;
      }catch{
        return null;
      }
    }

    function saveEntry(floor){
      const entry = { floor, parkedAt: new Date().toISOString() };
      localStorage.setItem(FLOOR_KEY, JSON.stringify(entry));
      currentEntry = entry;
      render();
      showToast(`Saved ${floor}`);
    }

    function clearEntry(){
      localStorage.removeItem(FLOOR_KEY);
      currentEntry = null;
    }

    function getViewMode(){
      return localStorage.getItem(VIEW_MODE_KEY) || "floor";
    }

    function setViewMode(mode){
      localStorage.setItem(VIEW_MODE_KEY, mode);
      render();
    }

    function openDb(){
      return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, 1);
        request.onupgradeneeded = () => {
          const db = request.result;
          if (!db.objectStoreNames.contains(STORE_NAME)) {
            db.createObjectStore(STORE_NAME);
          }
        };
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
      });
    }

    async function savePhoto(file){
      const db = await openDb();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, "readwrite");
        tx.objectStore(STORE_NAME).put({
          file,
          savedAt: new Date().toISOString()
        }, PHOTO_KEY);
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
      });
    }

    async function getPhoto(){
      const db = await openDb();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, "readonly");
        const req = tx.objectStore(STORE_NAME).get(PHOTO_KEY);
        req.onsuccess = () => resolve(req.result || null);
        req.onerror = () => reject(req.error);
      });
    }

    async function clearPhoto(){
      const db = await openDb();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, "readwrite");
        tx.objectStore(STORE_NAME).delete(PHOTO_KEY);
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
      });
    }

    function updateFloorButtons(selectedFloor){
      [...grid.querySelectorAll(".floor-btn")].forEach(btn => {
        const isSelected = btn.dataset.floor === selectedFloor;
        btn.classList.toggle("selected", isSelected);
        btn.setAttribute("aria-pressed", isSelected ? "true" : "false");
      });
    }

    function render(){
      const mode = getViewMode();
      const hasPhoto = !!currentPhoto;
      const showPhoto = mode === "photo" && hasPhoto;

      floorView.classList.toggle("hidden", showPhoto);
      photoView.classList.toggle("hidden", !showPhoto);

      if (showPhoto) {
        statusLabel.textContent = "Saved location photo";
        savedPhoto.src = URL.createObjectURL(currentPhoto.file);
        toggleBtn.textContent = "View Floor";
        savedTimeEl.textContent = formatSavedTime(currentPhoto.savedAt);
      } else {
        const selectedFloor = currentEntry?.floor ?? null;
        statusLabel.textContent = "Saved parking floor";
        savedFloorEl.textContent = selectedFloor || "—";
        savedFloorEl.classList.toggle("status-empty", !selectedFloor);
        savedTimeEl.textContent = currentEntry?.parkedAt
          ? formatSavedTime(currentEntry.parkedAt)
          : "No parking spot saved yet.";
        toggleBtn.textContent = hasPhoto ? "View Location" : "View Location";
      }

      updateFloorButtons(currentEntry?.floor ?? null);
      toggleBtn.disabled = !hasPhoto;
      toggleBtn.style.opacity = hasPhoto ? "1" : ".45";
      toggleBtn.style.cursor = hasPhoto ? "pointer" : "default";
    }

    function buildGrid(){
      FLOORS.forEach(floor => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "floor-btn";
        btn.textContent = floor;
        btn.dataset.floor = floor;
        btn.setAttribute("aria-label", `Save parking floor ${floor}`);
        btn.addEventListener("click", () => {
          setViewMode("floor");
          saveEntry(floor);
        });
        grid.appendChild(btn);
      });
    }

    clearBtn.addEventListener("click", async () => {
      const hadFloor = !!currentEntry;
      const hadPhoto = !!currentPhoto;
      if (!hadFloor && !hadPhoto) {
        showToast("Nothing to clear");
        return;
      }
      clearEntry();
      await clearPhoto();
      currentPhoto = null;
      setViewMode("floor");
      render();
      showToast("Cleared");
    });

    captureBtn.addEventListener("click", () => photoInput.click());

    photoInput.addEventListener("change", async (event) => {
      const file = event.target.files && event.target.files[0];
      if (!file) return;
      await savePhoto(file);
      currentPhoto = await getPhoto();
      setViewMode("photo");
      render();
      showToast("Photo saved");
      photoInput.value = "";
    });

    toggleBtn.addEventListener("click", () => {
      if (!currentPhoto) return;
      const nextMode = getViewMode() === "photo" ? "floor" : "photo";
      setViewMode(nextMode);
    });

    async function init(){
      buildGrid();
      currentEntry = getSavedEntry();
      try{
        currentPhoto = await getPhoto();
      }catch{
        currentPhoto = null;
      }
      render();
      setInterval(() => {
        if ((getViewMode() === "photo" && currentPhoto?.savedAt) || (getViewMode() !== "photo" && currentEntry?.parkedAt)) {
          savedTimeEl.textContent = formatSavedTime(getViewMode() === "photo" && currentPhoto ? currentPhoto.savedAt : currentEntry.parkedAt);
        }
      }, 30000);
    }

    init();
  </script>
</body>
</html>
